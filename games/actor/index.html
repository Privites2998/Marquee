<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name the Actor · Marquee</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="actor.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="game-shell">
  <nav class="game-nav" data-game-header></nav>

  <section class="surface">
    <article class="actor-playbill">
      <div class="actor-playbill__header">
        <div class="actor-playbill__redacted" data-redacted>▮▮▮▮▮ ▮▮▮▮▮</div>
        <div class="actor-playbill__sub">Today's bio</div>
      </div>
      <div class="actor-playbill__bio" data-bio></div>

      <div class="actor-credits">
        <div class="actor-credits__label">Credits</div>
        <ol class="actor-credits__list" data-credits></ol>
      </div>
    </article>

    <div class="actor-input-row">
      <input class="input" data-input autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="Who is it?">
      <button class="btn" data-submit>Guess</button>
    </div>

    <div class="row row--center row--wrap" style="margin-top: 0.6rem">
      <button class="btn btn--ghost btn--sm" data-reveal>Reveal next credit</button>
      <button class="btn btn--ghost btn--sm" data-giveup>Give up</button>
    </div>

    <div class="guesses" data-guesses style="margin-top: 1rem"></div>

    <div data-result class="hidden"></div>
  </section>
</div>

<script src="../../shared.js"></script>
<script src="actors.js"></script>
<script src="actor.js"></script>
</body>
</html>
