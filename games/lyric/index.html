<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lyric · Marquee</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="lyric.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="game-shell">
  <nav class="game-nav" data-game-header></nav>

  <section class="surface">
    <div class="prompt">
      <div class="prompt__label">Today's lyric</div>
      <div class="prompt__body" data-lyric></div>
    </div>

    <div class="lyric-stage">
      <div class="lyric-stage__step" data-step-label>Step 1 of 2 — name the show</div>
      <div class="lyric-mask" data-mask></div>

      <div class="lyric-input-row">
        <input class="input" data-input type="text" autocomplete="off" autocapitalize="words" spellcheck="false" placeholder="Type your guess…">
        <button class="btn" data-submit>Guess</button>
      </div>

      <div class="row row--center row--wrap" style="margin-top: 0.6rem">
        <button class="btn btn--ghost btn--sm" data-reveal>Reveal a letter</button>
        <span class="lyric-cost" data-attempts>0 guesses · 0 reveals</span>
      </div>

      <div class="guesses" data-guesses></div>
    </div>

    <div data-result class="hidden"></div>
  </section>
</div>

<script src="../../shared.js"></script>
<script src="puzzles.js"></script>
<script src="lyric.js"></script>
</body>
</html>
